<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول - FAST NET</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#1e3c72,#2a5298);
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      direction:rtl;
      margin:0;
    }
    .login-container{
      background:#fff;
      padding:30px;
      border-radius:12px;
      width:320px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.3);
    }
    .login-container h2{ margin-bottom:20px; }
    input{
      width:100%;
      padding:12px;
      margin:15px 0;
      border-radius:8px;
      border:1px solid #ccc;
    }
    button{
      width:100%;
      padding:12px;
      background:#2a5298;
      color:#fff;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
    }
    button:hover{ background:#1e3c72; }
    #errorMsg{ color:red; display:none; margin-top:10px; }
  </style>
</head>
<body>

<div class="login-container">
  <h2>🔐 تسجيل الدخول - FAST NET</h2>
  <input type="password" id="password" placeholder="كلمة المرور">
  <button onclick="login()">دخول</button>
  <p id="errorMsg">كلمة المرور غير صحيحة</p>
</div>

<script>
const PASSWORD = "fastnet2027"; // ← ضع كلمة المرور هنا

function login(){
    const input = document.getElementById("password").value;
    if(input === PASSWORD){
        localStorage.setItem("auth","1");
        window.location.href = "index.html"; // لوحة التحكم
    } else {
        document.getElementById("errorMsg").style.display="block";
    }
}

// إذا كان المستخدم سجل الدخول مسبقاً
if(localStorage.getItem("auth")==="1"){
    window.location.href="index.html";
}
</script>

</body>
</html>
