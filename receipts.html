<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإيصالات - FAST NET</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; }
h1 { text-align:center; margin-bottom:20px; }
#search { margin-bottom:15px; padding:8px; width:100%; max-width:400px; display:block; margin-left:auto; margin-right:auto; }
table { width:100%; border-collapse:collapse; margin-top:10px; background:white; }
th, td { padding:10px; border:1px solid #ddd; text-align:center; }
th { background-color:#007bff; color:white; }
button { padding:5px 10px; cursor:pointer; margin:2px; }
.print-btn { background-color:#28a745; color:white; border:none; }
.back-btn { background-color:#34495e; color:white; padding:5px 10px; border:none; cursor:pointer; margin-bottom:10px; border-radius:4px; }
</style>
</head>
<body>

<h1>الإيصالات</h1>

<button class="back-btn" onclick="window.location.href='index.html'">العودة للرئيسية</button>

<input type="text" id="search" placeholder="ابحث بالإسم أو رقم الهاتف..." onkeyup="renderTable()">

<table>
<thead>
<tr>
<th>رقم الإيصال</th>
<th>المشترك</th>
<th>رقم الهاتف</th>
<th>سعر الاشتراك</th>
<th>المبلغ المدفوع</th>
<th>المتبقي</th>
<th>تاريخ الدفع</th>
<th>طباعة</th>
</tr>
</thead>
<tbody id="receiptsTableBody"></tbody>
</table>

<script>
let receipts = JSON.parse(localStorage.getItem("receipts")) || [];

function renderTable(){
    const tableBody = document.getElementById("receiptsTableBody");
    const search = document.getElementById("search").value.toLowerCase();
    tableBody.innerHTML = "";

    let filtered = receipts.filter(r => r.name.toLowerCase().includes(search) || r.phone.toLowerCase().includes(search));

    if(filtered.length === 0){
        tableBody.innerHTML = `<tr><td colspan="8">لا توجد إيصالات.</td></tr>`;
        return;
    }

    filtered.forEach(r => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${r.id}</td>
            <td>${r.name}</td>
            <td>${r.phone}</td>
            <td>$${r.total}</td>
            <td>$${r.amount}</td>
            <td>$${r.remaining}</td>
            <td>${r.date}</td>
            <td><button class="print-btn" onclick="printReceipt('${r.id}')">طباعة</button></td>
        `;
        tableBody.appendChild(tr);
    });
}

function printReceipt(id){
    const r = receipts.find(rec => rec.id === id);
    if(!r) return;

    const win = window.open("", "PrintReceipt", "width=300,height=600");
    const status = r.remaining === 0 ? 'مدفوع كليًا' : (r.remaining < r.total ? 'مدفوع جزئيًا':'غير مدفوع');

    win.document.write(`
    <div style="font-family:Arial; width:280px; padding:10px;">
        <h3 style="text-align:center;">FAST NET</h3>
        <p style="text-align:center;">هاتف الشركة: 71346411 / 71338640</p>
        <hr>
        <p><strong>رقم الإيصال:</strong> ${r.id}</p>
        <p><strong>المشترك:</strong> ${r.name}</p>
        <p><strong>رقم الهاتف:</strong> ${r.phone}</p>
        <p><strong>سعر الاشتراك:</strong> $${r.total}</p>
        <p><strong>المبلغ المدفوع:</strong> $${r.amount}</p>
        <p><strong>المتبقي:</strong> $${r.remaining}</p>
        <p><strong>حالة الدفع:</strong> ${status}</p>
        <p><strong>تاريخ الدفع:</strong> ${r.date}</p>
        <hr>
        <p style="text-align:center;">شكراً لاستخدامكم FAST NET</p>
    </div>
    `);
    win.print();
}

renderTable();
</script>

</body>
</html>
