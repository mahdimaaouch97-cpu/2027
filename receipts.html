<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإيصالات - FAST NET</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 20px;
    direction: rtl;
    margin: 0;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #007bff;
}

.controls {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 15px;
}

#search, #filterStatus {
    padding: 8px;
    width: 200px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    margin-top: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

th {
    background: #007bff;
    color: white;
    font-weight: bold;
}

tr:nth-child(even) {
    background-color: #f9f9f9;
}

tr:hover {
    background-color: #f1f1f1;
}

button {
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 4px;
    border: none;
    font-size: 13px;
}

.print-btn {
    background: #28a745;
    color: white;
}

.back-btn {
    background: #34495e;
    color: white;
    padding: 7px 20px;
    margin-bottom: 20px;
    display: block;
    margin-left: auto;
    margin-right: auto;
}

@media (max-width: 600px) {
    .controls {
        flex-direction: column;
        align-items: center;
    }
    #search, #filterStatus {
        width: 90%;
    }
}
</style>
</head>

<body>

<h1>الإيصالات - FAST NET</h1>

<button class="back-btn" onclick="window.location.href='index.html'">
العودة إلى الرئيسية
</button>

<div class="controls">
    <input type="text" id="search" placeholder="ابحث باسم المشترك..." onkeyup="renderTable()">
    <select id="filterStatus" onchange="renderTable()">
        <option value="all">الكل</option>
        <option value="full">مدفوع كليًا</option>
        <option value="partial">مدفوع جزئيًا</option>
    </select>
</div>

<table>
<thead>
<tr>
    <th>رقم الإيصال</th>
    <th>المشترك</th>
    <th>سعر الاشتراك</th>
    <th>المدفوع</th>
    <th>المتبقي</th>
    <th>الشهر</th>
    <th>الحالة</th>
    <th>التاريخ</th>
    <th>طباعة</th>
</tr>
</thead>
<tbody id="receiptsTableBody"></tbody>
</table>

<!-- ربط ملف JS الخارجي -->
<script src="assets/js/receipts.js"></script>

</body>
</html>
