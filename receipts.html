<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإيصالات - FAST NET</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 20px;
    direction: rtl;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

#search, #filterStatus {
    padding: 8px;
    width: 100%;
    max-width: 400px;
    display: block;
    margin: 10px auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

th {
    background: #007bff;
    color: white;
}

button {
    padding: 5px 10px;
    cursor: pointer;
}

.print-btn {
    background: #28a745;
    color: white;
    border: none;
    border-radius: 4px;
}

.back-btn {
    background: #34495e;
    color: white;
    border: none;
    padding: 7px 15px;
    border-radius: 4px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>الإيصالات - FAST NET</h1>

<button class="back-btn" onclick="window.location.href='index.html'">
العودة إلى الرئيسية
</button>

<input type="text" id="search" placeholder="ابحث باسم المشترك..." onkeyup="renderTable()">

<select id="filterStatus" onchange="renderTable()">
    <option value="all">الكل</option>
    <option value="full">مدفوع كليًا</option>
    <option value="partial">مدفوع جزئيًا</option>
</select>

<table>
<thead>
<tr>
    <th>رقم الإيصال</th>
    <th>المشترك</th>
    <th>سعر الاشتراك</th>
    <th>المدفوع</th>
    <th>المتبقي</th>
    <th>الشهر</th>
    <th>الحالة</th>
    <th>التاريخ</th>
    <th>طباعة</th>
</tr>
</thead>
<tbody id="receiptsTableBody"></tbody>
</table>

<!-- ربط ملف JS خارجي -->
<script src="assets/js/receipts.js"></script>

</body>
</html>
