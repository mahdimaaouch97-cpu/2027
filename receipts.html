<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإيصالات - FAST NET</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 20px;
    direction: rtl;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

#search, #filterStatus {
    padding: 8px;
    width: 100%;
    max-width: 400px;
    display: block;
    margin: 10px auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

th {
    background: #007bff;
    color: white;
}

button {
    padding: 5px 10px;
    cursor: pointer;
}

.print-btn {
    background: #28a745;
    color: white;
    border: none;
    border-radius: 4px;
}

.back-btn {
    background: #34495e;
    color: white;
    border: none;
    padding: 7px 15px;
    border-radius: 4px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>الإيصالات - FAST NET</h1>

<button class="back-btn" onclick="window.location.href='index.html'">
العودة إلى الرئيسية
</button>

<input type="text" id="search" placeholder="ابحث باسم المشترك..." onkeyup="renderTable()">

<select id="filterStatus" onchange="renderTable()">
    <option value="all">الكل</option>
    <option value="full">مدفوع كليًا</option>
    <option value="partial">مدفوع جزئيًا</option>
</select>

<table>
<thead>
<tr>
    <th>رقم الإيصال</th>
    <th>المشترك</th>
    <th>سعر الاشتراك</th>
    <th>المدفوع</th>
    <th>المتبقي</th>
    <th>الشهر</th>
    <th>الحالة</th>
    <th>التاريخ</th>
    <th>طباعة</th>
</tr>
</thead>
<tbody id="receiptsTableBody"></tbody>
</table>

<script>
// تحميل الإيصالات فقط (بدون إنشاء)
let receipts = JSON.parse(localStorage.getItem("receipts")) || [];

function renderTable(){
    const tableBody = document.getElementById("receiptsTableBody");
    const search = document.getElementById("search").value.toLowerCase();
    const statusFilter = document.getElementById("filterStatus").value;

    tableBody.innerHTML = "";

    let filtered = receipts.filter(r => {
        const matchesSearch = r.name.toLowerCase().includes(search);

        let matchesStatus = true;
        if(statusFilter === "full") {
            matchesStatus = r.remaining === 0;
        }
        if(statusFilter === "partial") {
            matchesStatus = r.remaining > 0 && r.remaining < r.total;
        }

        return matchesSearch && matchesStatus;
    });

    if(filtered.length === 0){
        tableBody.innerHTML =
            `<tr><td colspan="9">لا توجد إيصالات</td></tr>`;
        return;
    }

    filtered.forEach(r => {
        const statusText =
            r.remaining === 0 ? "مدفوع كليًا" :
            "مدفوع جزئيًا";

        tableBody.innerHTML += `
        <tr>
            <td>${r.id}</td>
            <td>${r.name}</td>
            <td>$${r.total}</td>
            <td>$${r.amount}</td>
            <td>$${r.remaining}</td>
            <td>${r.month}</td>
            <td>${statusText}</td>
            <td>${r.date}</td>
            <td>
                <button class="print-btn" onclick="printReceipt(${r.id})">
                طباعة
                </button>
            </td>
        </tr>
        `;
    });
}

function printReceipt(id){
    const r = receipts.find(x => x.id == id);
    if(!r) return alert("الإيصال غير موجود");

    const status =
        r.remaining === 0 ? "مدفوع كليًا" : "مدفوع جزئيًا";

    const win = window.open("", "", "width=220,height=500");

    win.document.write(`
    <div style="direction:rtl;font-family:Arial;font-size:12px">
        <h3 style="text-align:center;margin:0">FAST NET</h3>
        <p style="text-align:center;margin:2px 0">71346411</p>
        <hr>
        <p>رقم الإيصال: ${r.id}</p>
        <p>المشترك: ${r.name}</p>
        <p>العنوان: ${r.address || "غير محدد"}</p>
        <p>سعر الاشتراك: $${r.total}</p>
        <p>المدفوع: $${r.amount}</p>
        <p>المتبقي: $${r.remaining}</p>
        <p>الشهر: ${r.month}</p>
        <p>الحالة: ${status}</p>
        <p>التاريخ: ${r.date}</p>
        <hr>
        <p style="text-align:center;font-weight:bold">
        شكراً لاستخدامكم FAST NET
        </p>
    </div>
    `);

    win.print();
}

renderTable();
</script>

</body>
</html>
