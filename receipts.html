<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإيصالات - FAST NET</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; }
h1 { text-align:center; margin-bottom:20px; }
#search { margin-bottom:15px; padding:8px; width:100%; max-width:400px; display:block; margin-left:auto; margin-right:auto; }
table { width:100%; border-collapse:collapse; margin-top:10px; background:white; }
th, td { padding:10px; border:1px solid #ddd; text-align:center; }
th { background-color:#007bff; color:white; }
button { padding:5px 10px; cursor:pointer; margin:2px; }
.print-btn { background-color:#28a745; color:white; border:none; }
.back-btn { background-color:#34495e; color:white; padding:5px 10px; border:none; cursor:pointer; margin-bottom:10px; border-radius:4px; }
</style>
</head>
<body>

<h1>الإيصالات</h1>

<button class="back-btn" onclick="window.location.href='index.html'">العودة للرئيسية</button>

<input type="text" id="search" placeholder="ابحث بالإسم أو رقم الهاتف..." onkeyup="renderTable()">

<table>
<thead>
<tr>
<th>رقم الإيصال</th>
<th>المشترك</th>
<th>رقم الهاتف</th>
<th>سعر الاشتراك</th>
<th>المبلغ المدفوع</th>
<th>المتبقي</th>
<th>الشهر</th>
<th>حالة الدفع</th>
<th>تاريخ الدفع</th>
<th>طباعة</th>
</tr>
</thead>
<tbody id="receiptsTableBody"></tbody>
</table>

<script>
let subscribers = JSON.parse(localStorage.getItem("subscribers")) || [];

function renderTable(){
    const tableBody = document.getElementById("receiptsTableBody");
    const search = document.getElementById("search").value.toLowerCase();
    tableBody.innerHTML = "";

    let rows = [];

    subscribers.forEach(sub => {
        if(sub.payments && sub.payments.length > 0){
            sub.payments.forEach((p, i) => {
                rows.push({
                    id: `${sub.id}-${i+1}`,
                    name: sub.name,
                    phone: sub.phone,
                    total: sub.price,
                    amount: Number(p.amount),
                    remaining: sub.remaining,
                    month: p.month,
                    date: p.date
                });
            });
        } else {
            rows.push({
                id: `${sub.id}-0`,
                name: sub.name,
                phone: sub.phone,
                total: sub.price,
                amount: 0,
                remaining: sub.price,
                month: "-",
                date: "-"
            });
        }
    });

    let filtered = rows.filter(r => r.name.toLowerCase().includes(search) || r.phone.toLowerCase().includes(search));

    if(filtered.length === 0){
        tableBody.innerHTML = `<tr><td colspan="10">لا توجد إيصالات.</td></tr>`;
        return;
    }

    filtered.forEach(r => {
        const status = r.remaining === 0 ? 'مدفوع كليًا' : (r.remaining < r.total ? 'مدفوع جزئيًا':'غير مدفوع');
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${r.id}</td>
            <td>${r.name}</td>
            <td>${r.phone}</td>
            <td>$${r.total}</td>
            <td>$${r.amount}</td>
            <td>$${r.remaining}</td>
            <td>${r.month}</td>
            <td>${status}</td>
            <td>${r.date}</td>
            <td><button class="print-btn" onclick="printReceipt('${r.id}')">طباعة</button></td>
        `;
        tableBody.appendChild(tr);
    });
}

function printReceipt(id){
    const subId = id.split("-")[0];
    const paymentIndex = parseInt(id.split("-")[1]) - 1;

    const sub = subscribers.find(s => s.id == subId);
    if(!sub) return;

    let payment = sub.payments && sub.payments[paymentIndex] ? sub.payments[paymentIndex] : {amount: 0, month: "-", date: "-"};
    const remaining = sub.remaining;
    const status = remaining === 0 ? 'مدفوع كليًا' : (remaining < sub.price ? 'مدفوع جزئيًا' : 'غير مدفوع');

    const win = window.open("", "PrintReceipt", "width=300,height=600");
    win.document.write(`
    <div style="font-family:Arial; width:280px; padding:10px;">
        <h3 style="text-align:center;">FAST NET</h3>
        <p style="text-align:center;">هاتف الشركة: 71346411 / 71338640</p>
        <hr>
        <table style="width:100%; border-collapse: collapse;">
            <tr><td><strong>رقم الإيصال:</strong></td><td>${id}</td></tr>
            <tr><td><strong>المشترك:</strong></td><td>${sub.name}</td></tr>
            <tr><td><strong>رقم الهاتف:</strong></td><td>${sub.phone}</td></tr>
            <tr><td><strong>سعر الاشتراك:</strong></td><td>$${sub.price}</td></tr>
            <tr><td><strong>المبلغ المدفوع:</strong></td><td>$${payment.amount}</td></tr>
            <tr><td><strong>المتبقي:</strong></td><td>$${remaining}</td></tr>
            <tr><td><strong>الشهر:</strong></td><td>${payment.month}</td></tr>
            <tr><td><strong>حالة الدفع:</strong></td><td>${status}</td></tr>
            <tr><td><strong>تاريخ الدفع:</strong></td><td>${payment.date}</td></tr>
        </table>
        <hr>
        <p style="text-align:center;">شكراً لاستخدامكم FAST NET</p>
    </div>
    `);
    win.print();
}

renderTable();
</script>

</body>
</html>
