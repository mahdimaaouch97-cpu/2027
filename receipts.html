<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإيصالات - FAST NET</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; direction:rtl; }
h1 { text-align:center; margin-bottom:20px; }
#search, #filterStatus { padding:8px; width:100%; max-width:400px; display:block; margin:10px auto; }
table { width:100%; border-collapse:collapse; margin-top:10px; background:white; }
th, td { padding:10px; border:1px solid #ddd; text-align:center; }
th { background-color:#007bff; color:white; }
button { padding:5px 10px; cursor:pointer; margin:2px; }
.print-btn { background-color:#28a745; color:white; border:none; }
.back-btn { background-color:#34495e; color:white; border:none; padding:5px 10px; margin-bottom:10px; border-radius:4px; }
</style>
</head>
<body>

<h1>الإيصالات - FAST NET</h1>

<button class="back-btn" onclick="window.location.href='index.html'">العودة للرئيسية</button>

<input type="text" id="search" placeholder="ابحث بالإسم..." onkeyup="renderTable()">

<select id="filterStatus" onchange="renderTable()">
    <option value="all">الكل</option>
    <option value="full">مدفوع كليًا</option>
    <option value="partial">مدفوع جزئيًا</option>
    <option value="unpaid">غير مدفوع</option>
</select>

<table>
<thead>
<tr>
<th>رقم الإيصال</th>
<th>المشترك</th>
<th>سعر الاشتراك</th>
<th>المبلغ المدفوع</th>
<th>المتبقي</th>
<th>الشهر</th>
<th>حالة الدفع</th>
<th>تاريخ الدفع</th>
<th>طباعة</th>
</tr>
</thead>
<tbody id="receiptsTableBody"></tbody>
</table>

<script>
// ====== تحميل البيانات ======
let subscribers = JSON.parse(localStorage.getItem("subscribers")) || [];
let receipts = JSON.parse(localStorage.getItem("receipts")) || [];

// رقم إيصال تلقائي
let lastReceiptNumber = parseInt(localStorage.getItem("lastReceiptNumber")) || 2000;

// ====== عرض جدول الإيصالات ======
function renderTable(){
    const tableBody = document.getElementById("receiptsTableBody");
    const search = document.getElementById("search").value.toLowerCase();
    const statusFilter = document.getElementById("filterStatus").value;
    tableBody.innerHTML = "";

    let rows = [];

    subscribers.forEach(sub => {
        sub.payments.forEach(payment => {
            let receipt = receipts.find(r => r.subscriberId === sub.id && r.amount === payment.amount && r.date === payment.date);
            if(!receipt){
                // إنشاء إيصال تلقائي إذا لم يوجد
                lastReceiptNumber++;
                receipt = {
                    id: lastReceiptNumber,
                    subscriberId: sub.id,
                    name: sub.name,
                    phone: sub.phone,
                    address: sub.address || "غير محدد",
                    total: sub.price,
                    amount: payment.amount,
                    remaining: sub.remaining,
                    month: payment.month,
                    date: payment.date
                };
                receipts.push(receipt);
                localStorage.setItem("receipts", JSON.stringify(receipts));
                localStorage.setItem("lastReceiptNumber", lastReceiptNumber);
            }
            rows.push(receipt);
        });
    });

    let filtered = rows.filter(r => {
        const matchesSearch = r.name.toLowerCase().includes(search);
        let matchesStatus = statusFilter === "all";
        if(statusFilter === "full") matchesStatus = r.remaining === 0;
        if(statusFilter === "partial") matchesStatus = r.remaining < r.total && r.remaining > 0;
        if(statusFilter === "unpaid") matchesStatus = r.remaining === r.total;
        return matchesSearch && matchesStatus;
    });

    if(filtered.length === 0){
        tableBody.innerHTML = `<tr><td colspan="9">لا توجد إيصالات.</td></tr>`;
        return;
    }

    filtered.forEach(r => {
        const statusText = r.remaining === 0 ? 'مدفوع كليًا' : (r.remaining < r.total ? 'مدفوع جزئيًا' : 'غير مدفوع');
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${r.id}</td>
            <td>${r.name}</td>
            <td>$${r.total}</td>
            <td>$${r.amount}</td>
            <td>$${r.remaining}</td>
            <td>${r.month}</td>
            <td>${statusText}</td>
            <td>${r.date}</td>
            <td><button class="print-btn" onclick="printReceipt(${r.id})">طباعة</button></td>
        `;
        tableBody.appendChild(tr);
    });
}

// ====== طباعة الإيصال RTL ======
function printReceipt(receiptId){
    const receipt = receipts.find(r => r.id == receiptId);
    if(!receipt) return alert("الإيصال غير موجود");

    const status = receipt.remaining===0 ? 'مدفوع كليًا' : (receipt.remaining<receipt.total ? 'مدفوع جزئيًا':'غير مدفوع');

    const win = window.open("", "PrintReceipt", "width=220,height=500");
    win.document.write(`
    <div style="font-family:Arial, sans-serif; width:200px; padding:5px; direction:rtl; text-align:right; font-size:12px;">
        <h3 style="text-align:center; margin:0;">FAST NET</h3>
        <p style="text-align:center; margin:2px 0; font-size:12px;">71346411 / 71338640</p>
        <hr>
        <table style="width:100%; border-collapse:collapse; direction:rtl; text-align:right; font-size:12px;">
            <tr><td style="font-weight:bold;">رقم الإيصال:</td><td>${receipt.id}</td></tr>
            <tr><td style="font-weight:bold;">المشترك:</td><td>${receipt.name}</td></tr>
            <tr><td style="font-weight:bold;">العنوان:</td><td>${receipt.address}</td></tr>
            <tr><td style="font-weight:bold;">سعر الاشتراك:</td><td>$${receipt.total}</td></tr>
            <tr><td style="font-weight:bold;">المبلغ المدفوع:</td><td>$${receipt.amount}</td></tr>
            <tr><td style="font-weight:bold;">المتبقي:</td><td>$${receipt.remaining}</td></tr>
            <tr><td style="font-weight:bold;">الشهر:</td><td>${receipt.month}</td></tr>
            <tr><td style="font-weight:bold;">حالة الدفع:</td><td>${status}</td></tr>
            <tr><td style="font-weight:bold;">تاريخ الدفع:</td><td>${receipt.date}</td></tr>
        </table>
        <hr>
        <p style="text-align:center; font-weight:bold; font-size:12px;">شكراً لاستخدامكم FAST NET</p>
    </div>
    `);
    win.print();
}

// ====== تشغيل الصفحة ======
renderTable();
</script>

</body>
</html>
