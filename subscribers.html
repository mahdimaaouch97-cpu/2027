<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المشتركين - POSNEW</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
h1 { text-align: center; margin-bottom: 10px; }
form { max-width: 500px; margin: auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
input, select { width: 100%; padding: 8px; margin-bottom: 10px; }
button { padding: 8px 12px; border: none; cursor: pointer; border-radius: 4px; margin: 2px; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
th, td { padding: 8px; border: 1px solid #ddd; text-align: center; }
th { background-color: #007bff; color: white; }
.delete-btn { background-color: #dc3545; color: white; border: none; padding: 5px 8px; cursor: pointer; border-radius:4px; }
.status-full { background-color: #388e3c; color:white; font-weight:bold; }
.status-partial { background-color: #f57c00; color:white; font-weight:bold; }
.status-unpaid { background-color: #c62828; color:white; font-weight:bold; }
.home-btn { background-color: #007bff; color: white; padding: 8px 16px; border-radius: 4px; font-weight:bold; transition: background-color 0.3s; }
.home-btn:hover { background-color: #0056b3; }
#importFile { display: none; }
#search, #filterStatus { max-width: 300px; margin: 10px auto; display: block; padding: 8px; }
</style>
</head>
<body>

<h1>إدارة المشتركين</h1>

<div style="text-align:center; margin-bottom:15px;">
    <button class="home-btn" onclick="goHome()">العودة إلى الصفحة الرئيسية</button>
    <button class="home-btn" onclick="goPayments()">صفحة الدفع</button>
</div>

<!-- شريط البحث والفلاتر -->
<input type="text" id="search" placeholder="ابحث عن المشترك بالاسم..." onkeyup="renderTable()">
<select id="filterStatus" onchange="renderTable()">
    <option value="all">الكل</option>
    <option value="full">مدفوع كليًا</option>
    <option value="partial">مدفوع جزئيًا</option>
    <option value="unpaid">غير مدفوع</option>
</select>

<form id="addSubscriberForm">
    <input type="text" id="name" placeholder="اسم المشترك" required>
    <input type="text" id="phone" placeholder="رقم الهاتف" required>
    <input type="number" id="price" placeholder="سعر الاشتراك ($)" min="0" required>
    <button type="submit" style="background-color:#007bff; color:white;">إضافة مشترك</button>
</form>

<div style="text-align:center; margin-top:10px;">
    <button onclick="deleteAllSubscribers()" style="background-color:#dc3545; color:white;">حذف جميع المشتركين</button>
    <button onclick="document.getElementById('importFile').click()" style="background-color:#28a745; color:white;">استيراد CSV</button>
    <button onclick="exportCSV()" style="background-color:#ffc107;">تصدير CSV</button>
    <input type="file" id="importFile" accept=".csv" onchange="importCSV(event)">
</div>

<table id="subscribersTable">
    <thead>
        <tr>
            <th>رقم المشترك</th>
            <th>الإسم</th>
            <th>رقم الهاتف</th>
            <th>سعر الاشتراك ($)</th>
            <th>المدفوع ($)</th>
            <th>المتبقي ($)</th>
            <th>حالة الدفع</th>
            <th>حذف</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
// جلب البيانات من LocalStorage
let subscribers = JSON.parse(localStorage.getItem("subscribers")) || [];

// تصحيح البيانات القديمة
subscribers = subscribers.map((sub, index) => ({
    id: sub.id !== undefined ? sub.id : index + 1,
    name: sub.name || "بدون اسم",
    phone: sub.phone || "غير محدد",
    price: sub.price !== undefined ? sub.price : 0,
    remaining: sub.remaining !== undefined ? sub.remaining : (sub.price || 0),
    payments: Array.isArray(sub.payments) ? sub.payments : []
}));

localStorage.setItem("subscribers", JSON.stringify(subscribers));

const form = document.getElementById("addSubscriberForm");
const tableBody = document.querySelector("#subscribersTable tbody");

// دوال التنقل
function goHome(){ window.location.href = "index.html"; }
function goPayments(){ window.location.href = "payments.html"; }

// عرض الجدول مع البحث والفلاتر
function renderTable(){
    const searchValue = document.getElementById("search").value.toLowerCase();
    const filterValue = document.getElementById("filterStatus").value;

    tableBody.innerHTML = "";
    let filtered = subscribers.filter(sub => {
        const paid = sub.payments.reduce((sum,p)=>sum+Number(p.amount),0).toFixed(2);
        const remaining = (sub.price - paid).toFixed(2);
        let status = "unpaid";
        if(remaining == 0) status = "full";
        else if(remaining < sub.price) status = "partial";

        // فلتر حسب البحث
        const matchesSearch = sub.name.toLowerCase().includes(searchValue);
        const matchesFilter = filterValue === "all" || status === filterValue;

        return matchesSearch && matchesFilter;
    });

    if(filtered.length === 0){
        tableBody.innerHTML = `<tr><td colspan="8">لا يوجد مشتركين.</td></tr>`;
        return;
    }

    filtered.forEach(sub => {
        const paidAmount = sub.payments.reduce((sum, p) => sum + Number(p.amount), 0).toFixed(2);
        const remaining = (sub.price - paidAmount).toFixed(2);
        let statusText = "غير مدفوع";
        let statusClass = "status-unpaid";
        if(remaining == 0) { statusText = "مدفوع كليًا"; statusClass = "status-full"; }
        else if(remaining < sub.price) { statusText = "مدفوع جزئيًا"; statusClass = "status-partial"; }

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${sub.id}</td>
            <td>${sub.name}</td>
            <td>${sub.phone}</td>
            <td>$${sub.price}</td>
            <td>$${paidAmount}</td>
            <td>$${remaining}</td>
            <td class="${statusClass}">${statusText}</td>
            <td><button class="delete-btn" onclick="deleteSubscriber(${sub.id})">حذف</button></td>
        `;
        tableBody.appendChild(tr);
    });
}

// إضافة مشترك
form.addEventListener("submit", (e)=>{
    e.preventDefault();
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const price = parseFloat(document.getElementById("price").value);
    if(!name || !phone || isNaN(price)) return alert("الرجاء إدخال بيانات صحيحة");

    const newId = subscribers.length > 0 ? subscribers[subscribers.length-1].id + 1 : 1;
    subscribers.push({ id:newId, name, phone, price, remaining:price, payments:[] });
    localStorage.setItem("subscribers", JSON.stringify(subscribers));
    form.reset();
    renderTable();
});

// حذف مشترك
function deleteSubscriber(id){
    if(!confirm("هل أنت متأكد من حذف هذا المشترك؟")) return;
    subscribers = subscribers.filter(sub => sub.id !== id);
    localStorage.setItem("subscribers", JSON.stringify(subscribers));
    renderTable();
}

// حذف جميع المشتركين
function deleteAllSubscribers(){
    if(!confirm("هل أنت متأكد من حذف جميع المشتركين؟")) return;
    subscribers = [];
    localStorage.setItem("subscribers", JSON.stringify(subscribers));
    renderTable();
}

// استيراد CSV
function importCSV(event){
    const file = event.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
        const text = e.target.result;
        const rows = text.trim().split("\n");
        rows.shift(); // تجاهل العنوان
        rows.forEach(row=>{
            const cols = row.split(",").map(c => c.replace(/^"(.*)"$/,'$1').trim());
            const [id,name,phone,price,paid,remaining,status] = cols;
            if(name && phone && !isNaN(price)){
                const newId = subscribers.length > 0 ? subscribers[subscribers.length-1].id + 1 : 1;
                const priceNum = parseFloat(price);
                const paidNum = parseFloat(paid) || 0;
                subscribers.push({
                    id: newId,
                    name: name,
                    phone: phone,
                    price: priceNum,
                    remaining: priceNum - paidNum,
                    payments: paidNum > 0 ? [{ amount: paidNum, month:"-", date: new Date().toLocaleDateString() }] : []
                });
            }
        });
        localStorage.setItem("subscribers", JSON.stringify(subscribers));
        renderTable();
    };
    reader.readAsText(file, "UTF-8");
}

// تصدير CSV مع دعم العربية
function exportCSV(){
    if(subscribers.length === 0) return alert("لا يوجد مشتركين للتصدير");
    const headers = ["ID","اسم المشترك","رقم الهاتف","سعر الاشتراك","المدفوع","المتبقي","حالة الدفع"];
    const rows = subscribers.map(sub=>{
        const paid = sub.payments.reduce((sum,p)=>sum+Number(p.amount),0).toFixed(2);
        const remaining = (sub.price - paid).toFixed(2);
        let status = "غير مدفوع";
        if(remaining==0) status="مدفوع كليًا";
        else if(remaining<sub.price) status="مدفوع جزئيًا";
        return [
            `"${sub.id}"`,
            `"${sub.name}"`,
            `"${sub.phone}"`,
            `"${sub.price}"`,
            `"${paid}"`,
            `"${remaining}"`,
            `"${status}"`
        ].join(",");
    });
    const csvContent = "\uFEFF" + [headers.join(","), ...rows].join("\n");
    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "subscribers.csv";
    link.click();
}

renderTable();
</script>

</body>
</html>
