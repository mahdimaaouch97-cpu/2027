<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشتركين - POSNEW</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        h1 { text-align: center; margin-bottom: 20px; }
        form { max-width: 500px; margin: auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { padding: 8px 12px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #007bff; color: white; }
        .delete-btn { background-color: #dc3545; color: white; border: none; padding: 5px 8px; cursor: pointer; }
    </style>
</head>
<body>

<h1>إدارة المشتركين</h1>

<form id="addSubscriberForm">
    <input type="text" id="name" placeholder="اسم المشترك" required>
    <input type="text" id="phone" placeholder="رقم الهاتف" required>
    <input type="number" id="price" placeholder="سعر الاشتراك ($)" min="0" required>
    <button type="submit">إضافة مشترك</button>
</form>

<table id="subscribersTable">
    <thead>
        <tr>
            <th>رقم المشترك</th>
            <th>الإسم</th>
            <th>رقم الهاتف</th>
            <th>سعر الاشتراك ($)</th>
            <th>حذف</th>
        </tr>
    </thead>
    <tbody>
        <!-- سيتم تعبئتها تلقائيًا -->
    </tbody>
</table>

<script>
    let subscribers = JSON.parse(localStorage.getItem("subscribers")) || [];

    const form = document.getElementById("addSubscriberForm");
    const tableBody = document.querySelector("#subscribersTable tbody");

    function renderTable() {
        tableBody.innerHTML = "";
        if(subscribers.length === 0){
            tableBody.innerHTML = `<tr><td colspan="5">لا يوجد مشتركين حاليا.</td></tr>`;
            return;
        }
        subscribers.forEach(sub => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${sub.id}</td>
                <td>${sub.name}</td>
                <td>${sub.phone}</td>
                <td>$${sub.price}</td>
                <td><button class="delete-btn" onclick="deleteSubscriber(${sub.id})">حذف</button></td>
            `;
            tableBody.appendChild(tr);
        });
    }

    form.addEventListener("submit", (e) => {
        e.preventDefault();
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const price = parseFloat(document.getElementById("price").value);
        if(!name || !phone || isNaN(price)) return alert("الرجاء إدخال بيانات صحيحة");

        const newId = subscribers.length > 0 ? subscribers[subscribers.length-1].id + 1 : 1;
        subscribers.push({id: newId, name, phone, price, remaining: price, payments: []});
        localStorage.setItem("subscribers", JSON.stringify(subscribers));
        form.reset();
        renderTable();
    });

    function deleteSubscriber(id){
        if(!confirm("هل أنت متأكد من حذف هذا المشترك؟")) return;
        subscribers = subscribers.filter(sub => sub.id !== id);
        localStorage.setItem("subscribers", JSON.stringify(subscribers));
        renderTable();
    }

    renderTable();
</script>

</body>
</html>
