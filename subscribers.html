<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المشتركين - POSNEW</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; direction: rtl; }
h1 { text-align: center; margin-bottom: 15px; color: #333; }
.top-buttons { text-align:center; margin-bottom: 20px; }
.top-buttons button { margin: 5px; padding: 10px 16px; font-weight: bold; border-radius: 5px; border:none; cursor:pointer; }
.home-btn { background-color: #007bff; color:white; }
.search-filter { max-width: 500px; margin: 0 auto 15px auto; display: flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.search-filter input, .search-filter select { flex:1; padding:8px; border-radius:5px; border:1px solid #ccc; }
.add-form { max-width: 500px; margin: 0 auto 15px auto; background:#fff; padding:15px; border-radius:8px; box-shadow:0 0 5px rgba(0,0,0,0.2); }
.add-form input { width:100%; padding:8px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc; }
.add-form button { width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
.table-container { overflow-x:auto; }
table { width:100%; border-collapse: collapse; margin-top:10px; }
th, td { padding:10px; border:1px solid #ddd; text-align:center; }
th { background-color: #007bff; color:white; }
tr:nth-child(even) { background-color: #f9f9f9; }
.delete-btn { background-color: #dc3545; color:white; padding:5px 8px; border:none; border-radius:4px; cursor:pointer; }
.reminder-btn { background-color: #25D366; color:white; padding:5px 8px; border:none; border-radius:4px; cursor:pointer; font-size:12px; }
.status-full { background-color: #388e3c; color:white; font-weight:bold; }
.status-partial { background-color: #f57c00; color:white; font-weight:bold; }
.status-unpaid { background-color: #c62828; color:white; font-weight:bold; }
.export-import { text-align:center; margin:15px 0; }
.export-import button { margin:3px; padding:8px 14px; border:none; border-radius:5px; cursor:pointer; }
</style>
</head>
<body>

<h1>إدارة المشتركين</h1>

<div class="top-buttons">
    <button class="home-btn" onclick="goHome()">العودة للرئيسية</button>
    <button class="home-btn" onclick="goPayments()">صفحة الدفع</button>
</div>

<div class="search-filter">
    <input type="text" id="search" placeholder="بحث بالاسم..." onkeyup="renderTable()">
    <select id="filterStatus" onchange="renderTable()">
        <option value="all">الكل</option>
        <option value="full">مدفوع كليًا</option>
        <option value="partial">مدفوع جزئيًا</option>
        <option value="unpaid">غير مدفوع</option>
    </select>
</div>

<div class="add-form">
    <input type="text" id="name" placeholder="اسم المشترك">
    <input type="text" id="phone" placeholder="رقم الهاتف">
    <input type="text" id="address" placeholder="العنوان">
    <input type="number" id="price" placeholder="سعر الاشتراك ($)">
    <button id="addBtn">إضافة مشترك</button>
</div>

<div class="export-import">
    <button onclick="deleteAllSubscribers()" style="background:#dc3545;color:white;">حذف الجميع</button>
    <button onclick="document.getElementById('importFile').click()" style="background:#28a745;color:white;">استيراد CSV</button>
    <button onclick="exportCSV()" style="background:#ffc107;">تصدير CSV</button>
    <input type="file" id="importFile" accept=".csv" onchange="importCSV(event)" hidden>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>ID</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>العنوان</th>
<th>السعر</th>
<th>المدفوع</th>
<th>المتبقي</th>
<th>الحالة</th>
<th>تذكير</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>
let subscribers = JSON.parse(localStorage.getItem("subscribers")) || [];

subscribers = subscribers.map((s,i)=>({
 id: s.id ?? i+1,
 name: s.name || "بدون اسم",
 phone: s.phone || "-",
 address: s.address || "غير محدد",
 price: s.price ?? 0,
 payments: Array.isArray(s.payments) ? s.payments : []
}));

localStorage.setItem("subscribers",JSON.stringify(subscribers));

const tableBody=document.getElementById("tableBody");

function goHome(){location.href="index.html";}
function goPayments(){location.href="payments.html";}

function renderTable(){
 tableBody.innerHTML="";
 const search=document.getElementById("search").value.toLowerCase();
 const filter=document.getElementById("filterStatus").value;

 subscribers.filter(s=>{
  const paid=s.payments.reduce((a,p)=>a+Number(p.amount),0);
  const remaining=s.price-paid;
  let status="unpaid";
  if(remaining==0) status="full";
  else if(remaining<s.price) status="partial";
  return s.name.toLowerCase().includes(search) && (filter=="all"||filter==status);
 }).forEach(s=>{
  const paid=s.payments.reduce((a,p)=>a+Number(p.amount),0);
  const remaining=s.price-paid;
  let cls="status-unpaid", txt="غير مدفوع";
  if(remaining==0){cls="status-full";txt="مدفوع كليًا";}
  else if(remaining<s.price){cls="status-partial";txt="مدفوع جزئيًا";}
  tableBody.innerHTML+=`
<tr>
<td>${s.id}</td>
<td>${s.name}</td>
<td>${s.phone}</td>
<td>${s.address}</td>
<td>$${s.price}</td>
<td>$${paid}</td>
<td>$${remaining}</td>
<td class="${cls}">${txt}</td>
<td>${remaining>0?`<button class="reminder-btn" onclick="sendReminder(${s.id})">واتساب</button>`:""}</td>
<td><button class="delete-btn" onclick="deleteSubscriber(${s.id})">X</button></td>
</tr>`;
 });
}

document.getElementById("addBtn").onclick=()=>{
 const name=nameInput.value.trim();
 const phone=phoneInput.value.trim();
 const address=addressInput.value.trim();
 const price=parseFloat(priceInput.value);
 if(!name||!phone||!address||isNaN(price)) return alert("أدخل كل البيانات");
 subscribers.push({id:Date.now(),name,phone,address,price,payments:[]});
 localStorage.setItem("subscribers",JSON.stringify(subscribers));
 nameInput.value=phoneInput.value=addressInput.value=priceInput.value="";
 renderTable();
};

function deleteSubscriber(id){
 subscribers=subscribers.filter(s=>s.id!==id);
 localStorage.setItem("subscribers",JSON.stringify(subscribers));
 renderTable();
}

function deleteAllSubscribers(){
 if(confirm("تأكيد حذف الجميع؟")){
  subscribers=[];
  localStorage.removeItem("subscribers");
  renderTable();
 }
}

function sendReminder(id){
 const s=subscribers.find(x=>x.id===id);
 const paid=s.payments.reduce((a,p)=>a+Number(p.amount),0);
 const remaining=s.price-paid;
 const msg=`مرحبا ${s.name}\nالعنوان: ${s.address}\nالمتبقي: $${remaining}`;
 window.open(`https://wa.me/${s.phone}?text=${encodeURIComponent(msg)}`);
}

function exportCSV(){
 let csv="ID,الاسم,الهاتف,العنوان,السعر\n";
 subscribers.forEach(s=>{
  csv+=`${s.id},${s.name},${s.phone},${s.address},${s.price}\n`;
 });
 const blob=new Blob(["\uFEFF"+csv],{type:"text/csv"});
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="subscribers.csv";
 a.click();
}

renderTable();
</script>

</body>
</html>
