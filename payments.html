<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدفع - POSNEW</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 20px;
}
h1 { text-align: center; margin-bottom: 20px; }

/* شريط البحث + زر العودة + الفلتر */
.top-bar {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

/* زر العودة */
.back-btn {
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.3s;
}
.back-btn:hover { background-color: #0056b3; }

/* البحث والفلتر */
#search { flex:1; min-width:200px; padding:8px; }
#filterStatus { padding:8px; }

/* الجدول */
#subscribersTable {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
th, td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: center;
}
th {
    background-color: #007bff;
    color: white;
    position: sticky;
    top: 0;
    z-index: 1;
    text-align: center;
}

/* ألوان حالة الدفع مخففة */
.status-full { background-color: #28a745; color: #ffffff; font-weight: bold; }    /* أخضر متوسط */
.status-partial { background-color: #ff8c00; color: #ffffff; font-weight: bold; } /* برتقالي متوسط */
.status-unpaid { background-color: #dc3545; color: #ffffff; font-weight: bold; }  /* أحمر متوسط */

/* أزرار الجدول */
button { padding: 5px 10px; margin: 2px; cursor: pointer; border-radius:4px; }
.print-btn { background-color: #28a745; color: white; border: none; }
.pay-btn { background-color: #ffc107; border: none; }
.wa-btn { background-color: #25D366; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; margin-left: 5px; }
input[type="number"], select { padding:5px; }
</style>
</head>
<body>

<h1>صفحة الدفع</h1>

<div class="top-bar">
    <button class="back-btn" onclick="goBack()">العودة للصفحة الرئيسية</button>
    <input type="text" id="search" placeholder="ابحث عن المشترك بالاسم أو رقم الهاتف..." onkeyup="renderTable()">
    <select id="filterStatus" onchange="renderTable()">
        <option value="all">الكل</option>
        <option value="full">مدفوع كليًا</option>
        <option value="partial">مدفوع جزئيًا</option>
        <option value="unpaid">غير مدفوع</option>
    </select>
</div>

<table id="subscribersTable">
<thead>
<tr>
<th>رقم المشترك</th>
<th>الإسم</th>
<th>رقم الهاتف</th>
<th>سعر الاشتراك ($)</th>
<th>السعر المدفوع ($)</th>
<th>المتبقي ($)</th>
<th>حالة الدفع</th>
<th>الدفع</th>
<th>طباعة الإيصال</th>
<th>واتساب</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let subscribers = JSON.parse(localStorage.getItem("subscribers")) || [];

subscribers = subscribers.map((sub, index) => ({
    id: sub.id !== undefined ? sub.id : index + 1,
    name: sub.name || "بدون اسم",
    phone: sub.phone || "غير محدد",
    price: Number(sub.price) || 0,
    remaining: sub.remaining !== undefined ? Number(sub.remaining) : Number(sub.price) || 0,
    payments: Array.isArray(sub.payments) ? sub.payments : []
}));

localStorage.setItem("subscribers", JSON.stringify(subscribers));

function goBack() {
    window.location.href = "index.html";
}

const tableBody = document.querySelector("#subscribersTable tbody");

function renderTable() {
    const searchFilter = document.getElementById("search").value.toLowerCase();
    const statusFilter = document.getElementById("filterStatus").value;
    tableBody.innerHTML = "";

    let filteredSubscribers = subscribers.filter(sub => {
        let status = "unpaid";
        if (sub.remaining === 0) status = "full";
        else if (sub.remaining < sub.price) status = "partial";

        if (statusFilter !== "all" && status !== statusFilter) return false;
        return sub.name.toLowerCase().includes(searchFilter) || sub.phone.toLowerCase().includes(searchFilter);
    });

    if (filteredSubscribers.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="10">لا يوجد مشتركين.</td></tr>`;
        return;
    }

    filteredSubscribers.forEach(sub => {
        const paidAmount = sub.payments.reduce((sum, p) => sum + Number(p.amount), 0).toFixed(2);

        let statusText = "غير مدفوع";
        let statusClass = "status-unpaid";
        if (sub.remaining === 0) { statusText = "مدفوع كليًا"; statusClass = "status-full"; }
        else if (sub.remaining < sub.price) { statusText = "مدفوع جزئيًا"; statusClass = "status-partial"; }

        const tr = document.createElement("tr");
        tr.innerHTML = `
<td>${sub.id}</td>
<td>${sub.name}</td>
<td>${sub.phone}</td>
<td>$${sub.price}</td>
<td>$${paidAmount}</td>
<td>$${sub.remaining}</td>
<td class="${statusClass}">${statusText}</td>
<td>
<select id="month-${sub.id}">
${[...Array(12)].map((_,i)=>`<option value="${i+1}">${i+1}</option>`).join("")}
</select>
<input type="number" id="pay-${sub.id}" min="0.01" max="${sub.remaining}" step="0.01" ${sub.remaining===0?"disabled":""}>
<button class="pay-btn" onclick="pay(${sub.id})" ${sub.remaining===0?"disabled":""}>دفع</button>
</td>
<td><button class="print-btn" onclick="printReceipt(${sub.id})">طباعة</button></td>
<td><button class="wa-btn" onclick="sendWhatsApp(${sub.id})">أرسل واتساب</button></td>
`;
        tableBody.appendChild(tr);
    });
}

function pay(id) {
    const sub = subscribers.find(s => s.id === id);
    const input = document.getElementById(`pay-${id}`);
    const month = document.getElementById(`month-${id}`).value;
    const amount = parseFloat(input.value);

    if (isNaN(amount) || amount <= 0 || amount > sub.remaining) {
        alert("مبلغ غير صالح");
        return;
    }

    sub.remaining = +(sub.remaining - amount).toFixed(2);
    sub.payments.push({ amount, month, date: new Date().toLocaleDateString() });
    localStorage.setItem("subscribers", JSON.stringify(subscribers));
    input.value = "";
    renderTable();

    // إرسال واتساب تلقائي بعد الدفع مع كل التفاصيل
    const lastPayment = sub.payments[sub.payments.length-1];
    const today = new Date().toLocaleDateString();
    let status = "❌ غير مدفوع";
    if(sub.remaining === 0) status = "✅ مدفوع بالكامل";
    else if(sub.remaining < sub.price) status = "⚠️ مدفوع جزئيًا";

    const msg = `📩 إشعار دفع FAST NET

👤 المشترك/ة: ${sub.name}
📞 الهاتف: ${sub.phone}
💲 سعر الاشتراك: $${sub.price}

💰 المبلغ المدفوع: $${lastPayment.amount}
💵 المبلغ المتبقي: $${sub.remaining}
🗓️ الشهر: ${lastPayment.month}
📅 التاريخ: ${today}
📌 الحالة: ${status}

شكراً لاستخدامكم خدماتنا! 🚀`;

    window.open(`https://wa.me/${sub.phone}?text=${encodeURIComponent(msg)}`, "_blank");
}

function sendWhatsApp(id) {
    const sub = subscribers.find(s => s.id === id);
    const last = sub.payments[sub.payments.length-1] || {amount:0, month:"-"};
    let status = "❌ غير مدفوع";
    if(sub.remaining === 0) status = "✅ مدفوع بالكامل";
    else if(sub.remaining < sub.price) status = "⚠️ مدفوع جزئيًا";

    const msg = `📩 إشعار دفع FAST NET

👤 المشترك/ة: ${sub.name}
📞 الهاتف: ${sub.phone}
💲 سعر الاشتراك: $${sub.price}

💰 المبلغ المدفوع: $${last.amount}
💵 المبلغ المتبقي: $${sub.remaining}
🗓️ الشهر: ${last.month}
📌 الحالة: ${status}

شكراً لاستخدامكم خدماتنا! 🚀`;

    window.open(`https://wa.me/${sub.phone}?text=${encodeURIComponent(msg)}`);
}

function printReceipt(id) {
    const sub = subscribers.find(s => s.id === id);
    const win = window.open("", "", "width=400,height=600");
    win.document.write(`<h3>FAST NET</h3><p>${sub.name}</p>`);
    win.print();
}

renderTable();
</script>

</body>
</html>
