<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>صفحة الدفع</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #fff;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        button {
            padding: 6px 12px;
            background-color: #25D366;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background-color: #1ebe57;
        }
    </style>
</head>
<body>

<h2>صفحة الدفع</h2>

<table id="paymentsTable">
    <thead>
        <tr>
            <th>اسم المشترك</th>
            <th>رقم الهاتف</th>
            <th>المبلغ</th>
            <th>الشهر</th>
            <th>إرسال واتساب</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Mahdi Maaouch</td>
            <td>96171346411</td>
            <td>50$</td>
            <td>يناير</td>
            <td><button class="waBtn">أرسل رسالة</button></td>
        </tr>
        <tr>
            <td>FAST NET</td>
            <td>96171338640</td>
            <td>75$</td>
            <td>يناير</td>
            <td><button class="waBtn">أرسل رسالة</button></td>
        </tr>
        <!-- يمكنك إضافة المزيد من الصفوف هنا -->
    </tbody>
</table>

<script>
document.querySelectorAll(".waBtn").forEach(button => {
    button.addEventListener("click", function() {
        // إيجاد الصف الحالي
        let row = this.closest("tr");
        let subscriberName = row.cells[0].innerText;
        let phone = row.cells[1].innerText;
        let amount = row.cells[2].innerText;
        let month = row.cells[3].innerText;

        // تكوين الرسالة
        let message = `مرحباً ${subscriberName},\nتم استلام دفع بقيمة ${amount} لشهر ${month}.`;

        // فتح واتساب
        let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        window.open(url, "_blank");
    });
});
</script>

</body>
</html>
