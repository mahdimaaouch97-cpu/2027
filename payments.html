<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدفع - FAST NET</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
h1 { text-align: center; margin-bottom: 20px; }
#search, #filterStatus { margin-bottom: 15px; padding: 8px; width: 100%; max-width: 400px; display: block; margin-left: auto; margin-right: auto; }
table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background:white; }
th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
th { background-color: #007bff; color: white; }
input[type="number"] { width: 80px; padding: 5px; }
select { padding: 5px; }
button { padding: 5px 10px; margin: 2px; cursor: pointer; }
.print-btn { background-color: #28a745; color: white; border: none; }
.pay-btn { background-color: #ffc107; border: none; }
.wa-btn { background-color: #25D366; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; margin-left: 5px; }
.status-paid { background-color:#27ae60; color:white; padding:3px 6px; border-radius:4px; }
.status-partial { background-color:#f39c12; color:white; padding:3px 6px; border-radius:4px; }
.status-unpaid { background-color:#c0392b; color:white; padding:3px 6px; border-radius:4px; }
.back-btn { background-color:#34495e; color:white; padding:5px 10px; border:none; cursor:pointer; margin-bottom:10px; border-radius:4px; }
</style>
</head>
<body>

<h1>صفحة الدفع</h1>

<button class="back-btn" onclick="window.location.href='index.html'">العودة للرئيسية</button>

<input type="text" id="search" placeholder="ابحث عن المشترك بالاسم أو رقم الهاتف..." onkeyup="renderTable()">

<select id="filterStatus" onchange="renderTable()">
    <option value="all">الكل</option>
    <option value="full">مدفوع كليًا</option>
    <option value="partial">مدفوع جزئيًا</option>
    <option value="unpaid">غير مدفوع</option>
</select>

<table id="subscribersTable">
<thead>
<tr>
<th>رقم المشترك</th>
<th>الإسم</th>
<th>رقم الهاتف</th>
<th>سعر الاشتراك ($)</th>
<th>المبلغ المدفوع ($)</th>
<th>المتبقي ($)</th>
<th>حالة الدفع</th>
<th>الشهر</th>
<th>الدفع</th>
<th>طباعة الإيصال</th>
<th>واتساب</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let subscribers = JSON.parse(localStorage.getItem("subscribers")) || [];
let receipts = JSON.parse(localStorage.getItem("receipts")) || [];

subscribers = subscribers.map((sub, index) => ({
    id: sub.id !== undefined ? sub.id : index + 1,
    name: sub.name || "بدون اسم",
    phone: sub.phone || "غير محدد",
    price: Number(sub.price) || 0,
    remaining: sub.remaining !== undefined ? Number(sub.remaining) : Number(sub.price) || 0,
    payments: Array.isArray(sub.payments) ? sub.payments : []
}));
localStorage.setItem("subscribers", JSON.stringify(subscribers));

function renderTable() {
    const tableBody = document.querySelector("#subscribersTable tbody");
    const searchFilter = document.getElementById("search").value.toLowerCase();
    const statusFilter = document.getElementById("filterStatus").value;
    tableBody.innerHTML = "";

    let filtered = subscribers.filter(sub => {
        let status = sub.remaining === 0 ? "full" : (sub.remaining < sub.price ? "partial" : "unpaid");
        if(statusFilter !== "all" && status !== statusFilter) return false;
        return sub.name.toLowerCase().includes(searchFilter) || sub.phone.toLowerCase().includes(searchFilter);
    });

    if(filtered.length === 0){
        tableBody.innerHTML = `<tr><td colspan="11">لا يوجد مشتركين مطابقين.</td></tr>`;
        return;
    }

    filtered.forEach(sub => {
        const paidAmount = sub.payments.reduce((sum, p) => sum + Number(p.amount), 0).toFixed(2);
        let statusHtml = sub.remaining === 0 ? '<span class="status-paid">مدفوع كليًا</span>' :
                         sub.remaining < sub.price ? '<span class="status-partial">مدفوع جزئيًا</span>' :
                         '<span class="status-unpaid">غير مدفوع</span>';

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${sub.id}</td>
            <td>${sub.name}</td>
            <td>${sub.phone}</td>
            <td>$${sub.price}</td>
            <td>$${paidAmount}</td>
            <td>$${sub.remaining}</td>
            <td>${statusHtml}</td>
            <td>
                <select id="month-${sub.id}">
                    ${[...Array(12)].map((_,i)=>`<option value="${i+1}">${i+1}</option>`).join("")}
                </select>
            </td>
            <td>
                <input type="number" id="pay-${sub.id}" min="0.01" max="${sub.remaining}" step="0.01" ${sub.remaining===0?"disabled":""}>
                <button class="pay-btn" onclick="pay(${sub.id})" ${sub.remaining===0?"disabled":""}>دفع</button>
            </td>
            <td><button class="print-btn" onclick="printReceipt(${sub.id})">طباعة</button></td>
            <td><button class="wa-btn" onclick="sendWhatsApp(${sub.id})">أرسل واتساب</button></td>
        `;
        tableBody.appendChild(tr);
    });
}

function pay(id) {
    const sub = subscribers.find(s => s.id === id);
    const amount = parseFloat(document.getElementById(`pay-${id}`).value);
    const month = document.getElementById(`month-${id}`).value;

    if(isNaN(amount) || amount <= 0 || amount > sub.remaining){
        return alert("الرجاء إدخال مبلغ صالح.");
    }

    sub.remaining = +(sub.remaining - amount).toFixed(2);
    sub.payments.push({ amount, month, date: new Date().toLocaleDateString() });
    localStorage.setItem("subscribers", JSON.stringify(subscribers));

    receipts.push({
        id: `${sub.id}-${sub.payments.length}`,
        subscriberId: sub.id,
        name: sub.name,
        phone: sub.phone,
        amount: amount,
        remaining: sub.remaining,
        total: sub.price,
        month: month,
        date: new Date().toLocaleDateString()
    });
    localStorage.setItem("receipts", JSON.stringify(receipts));

    document.getElementById(`pay-${id}`).value = "";
    renderTable();

    const msg = `📩 إشعار دفع FAST NET\n👤 المشترك: ${sub.name}\n💰 المبلغ المدفوع: $${amount}\n💵 المبلغ المتبقي: $${sub.remaining}\n🗓️ الشهر: ${month}\n📅 التاريخ: ${new Date().toLocaleDateString()}`;
    window.open(`https://wa.me/${sub.phone}?text=${encodeURIComponent(msg)}`, "_blank");
}

function sendWhatsApp(id){
    const sub = subscribers.find(s => s.id === id);
    const last = sub.payments[sub.payments.length-1];
    if(!last) return alert("لا توجد دفعات.");
    const msg = `📩 إشعار دفع FAST NET\n👤 المشترك: ${sub.name}\n💰 المبلغ المدفوع: $${last.amount}\n💵 المبلغ المتبقي: $${sub.remaining}\n🗓️ الشهر: ${last.month}\n📅 التاريخ: ${last.date}`;
    window.open(`https://wa.me/${sub.phone}?text=${encodeURIComponent(msg)}`, "_blank");
}

function printReceipt(id){
    const receipt = receipts.find(r => r.id === `${id}-${subscribers.find(s=>s.id===id).payments.length}`);
    if(!receipt) return;

    const sub = subscribers.find(s => s.id === id);
    const status = receipt.remaining===0 ? 'مدفوع كليًا' : (receipt.remaining<receipt.total ? 'مدفوع جزئيًا':'غير مدفوع');

    const win = window.open("", "PrintReceipt", "width=300,height=600");
    win.document.write(`
    <div style="font-family:Arial, sans-serif; width:280px; padding:10px; line-height:1.4;">
        <h2 style="text-align:center; margin:5px 0;">FAST NET</h2>
        <p style="text-align:center; margin:2px 0;"> 71346411 / 71338640</p>
        <hr style="margin:5px 0;">
        <table style="width:100%; border-collapse:collapse;">
            <tr><td><strong>المشترك:</strong></td><td>${sub.name}</td></tr>
            <tr><td><strong>رقم الهاتف:</strong></td><td>${sub.phone}</td></tr>
            <tr><td><strong>سعر الاشتراك:</strong></td><td>$${receipt.total}</td></tr>
            <tr><td><strong>المبلغ المدفوع:</strong></td><td>$${receipt.amount}</td></tr>
            <tr><td><strong>المتبقي:</strong></td><td>$${receipt.remaining}</td></tr>
            <tr><td><strong>الشهر:</strong></td><td>${receipt.month}</td></tr>
            <tr><td><strong>حالة الدفع:</strong></td><td>${status}</td></tr>
            <tr><td><strong>تاريخ الدفع:</strong></td><td>${receipt.date}</td></tr>
        </table>
        <hr style="margin:5px 0;">
       
    </div>
    `);
    win.print();
}

renderTable();
</script>

</body>
</html>
