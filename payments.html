<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفع - POSNEW</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; }
        #search { margin-bottom: 15px; padding: 8px; width: 100%; max-width: 400px; display: block; margin-left: auto; margin-right: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #007bff; color: white; }
        input[type="number"] { width: 80px; padding: 5px; }
        button { padding: 5px 10px; margin: 2px; cursor: pointer; }
        .print-btn { background-color: #28a745; color: white; border: none; }
        .pay-btn { background-color: #ffc107; border: none; }
    </style>
</head>
<body>

<h1>صفحة الدفع</h1>

<input type="text" id="search" placeholder="ابحث عن المشترك بالاسم أو رقم الهاتف..." onkeyup="searchTable()">

<table id="subscribersTable">
    <thead>
        <tr>
            <th>رقم المشترك</th>
            <th>الإسم</th>
            <th>رقم الهاتف</th>
            <th>سعر الاشتراك ($)</th>
            <th>المتبقي ($)</th>
            <th>حالة الدفع</th>
            <th>الدفع</th>
            <th>طباعة الإيصال</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script>
    let subscribers = JSON.parse(localStorage.getItem("subscribers")) || [];

    const tableBody = document.querySelector("#subscribersTable tbody");

    function renderTable() {
        tableBody.innerHTML = "";
        if(subscribers.length === 0){
            const tr = document.createElement("tr");
            tr.innerHTML = `<td colspan="8">لا يوجد مشتركين حاليا.</td>`;
            tableBody.appendChild(tr);
            return;
        }

        subscribers.forEach(sub => {
            let status = "غير مدفوع";
            if(sub.remaining === 0) status = "مدفوع كليًا";
            else if(sub.remaining < sub.price) status = "مدفوع جزئيًا";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${sub.id}</td>
                <td>${sub.name}</td>
                <td>${sub.phone}</td>
                <td>$${sub.price}</td>
                <td>$${sub.remaining}</td>
                <td>${status}</td>
                <td>
                    <input type="number" id="pay-${sub.id}" placeholder="المبلغ" min="0" max="${sub.remaining}" ${sub.remaining === 0 ? "disabled" : ""}>
                    <button class="pay-btn" onclick="pay(${sub.id})" ${sub.remaining === 0 ? "disabled" : ""}>دفع</button>
                </td>
                <td>
                    <button class="print-btn" onclick="printReceipt(${sub.id})">طباعة</button>
                </td>
            `;
            tableBody.appendChild(tr);
        });
    }

    function pay(id) {
        const sub = subscribers.find(s => s.id === id);
        const input = document.getElementById(`pay-${id}`);
        let amount = parseFloat(input.value);

        if(isNaN(amount) || amount <= 0) {
            alert("الرجاء إدخال مبلغ صالح أكبر من صفر.");
            return;
        }

        if(amount > sub.remaining) {
            alert(`المبلغ المدفوع أكبر من المبلغ المتبقي ($${sub.remaining}).`);
            return;
        }

        sub.remaining -= amount; // خصم المبلغ المدفوع
        localStorage.setItem("subscribers", JSON.stringify(subscribers)); // حفظ التغيير

        alert(`تم دفع $${amount} للمشترك ${sub.name}. المبلغ المتبقي: $${sub.remaining}`);

        input.value = ""; // مسح الحقل
        renderTable(); // تحديث الجدول
    }

    function printReceipt(id) {
        const sub = subscribers.find(s => s.id === id);
        const status = sub.remaining === 0 ? "مدفوع كليًا" : (sub.remaining < sub.price ? "مدفوع جزئيًا" : "غير مدفوع");
        const receiptWindow = window.open("", "PrintReceipt", "width=400,height=600");
        receiptWindow.document.write(`
            <h2 style="text-align:center;">FAST NET</h2>
            <p>رقم الإيصال: ${Math.floor(Math.random()*10000)}</p>
            <p>المشترك: ${sub.name}</p>
            <p>رقم الهاتف: ${sub.phone}</p>
            <p>سعر الاشتراك: $${sub.price}</p>
            <p>المتبقي: $${sub.remaining}</p>
            <p>حالة الدفع: ${status}</p>
            <p>التاريخ: ${new Date().toLocaleDateString()}</p>
            <hr>
            <p style="text-align:center;">شكراً لاستخدامكم FAST NET</p>
        `);
        receiptWindow.print();
    }

    function searchTable() {
        const filter = document.getElementById("search").value.toLowerCase();
        const trs = tableBody.getElementsByTagName("tr");
        Array.from(trs).forEach(tr => {
            const name = tr.cells[1]?.textContent.toLowerCase() || "";
            const phone = tr.cells[2]?.textContent.toLowerCase() || "";
            if(name.includes(filter) || phone.includes(filter)) {
                tr.style.display = "";
            } else {
                tr.style.display = "none";
            }
        });
    }

    renderTable();
</script>

</body>
</html>
