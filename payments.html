<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدفع - FAST NET</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; direction:rtl; }
h1 { text-align:center; margin-bottom:20px; }
#search, #filterStatus { padding:8px; width:100%; max-width:400px; display:block; margin:10px auto; }
table { width:100%; border-collapse:collapse; margin-top:10px; background:white; }
th, td { padding:10px; border:1px solid #ddd; text-align:center; font-size:12px; }
th { background-color:#007bff; color:white; }
button { padding:5px 10px; cursor:pointer; margin:2px; font-size:12px; }
.pay-btn { background-color:#ffc107; color:white; border:none; }
.print-btn { background-color:#28a745; color:white; border:none; }
.wa-btn { background-color:#25d366; color:white; border:none; }
.back-btn { background-color:#34495e; color:white; border:none; padding:5px 10px; margin-bottom:10px; border-radius:4px; }
.status-paid { color:green; }
.status-partial { color:orange; }
.status-unpaid { color:red; }
</style>
</head>
<body>

<h1>الدفع - FAST NET</h1>

<button class="back-btn" onclick="window.location.href='index.html'">العودة للرئيسية</button>

<input type="text" id="search" placeholder="ابحث بالإسم أو رقم الهاتف..." onkeyup="renderTable()">
<select id="filterStatus" onchange="renderTable()">
    <option value="all">الكل</option>
    <option value="full">مدفوع كليًا</option>
    <option value="partial">مدفوع جزئيًا</option>
    <option value="unpaid">غير مدفوع</option>
</select>

<table>
<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>العنوان</th>
<th>سعر الاشتراك</th>
<th>المدفوع</th>
<th>المتبقي</th>
<th>حالة الدفع</th>
<th>الشهر</th>
<th>دفع</th>
<th>طباعة</th>
<th>واتساب</th>
</tr>
</thead>
<tbody id="subscribersTable"></tbody>
</table>

<script>
let subscribers = JSON.parse(localStorage.getItem("subscribers")) || [];
let receipts = JSON.parse(localStorage.getItem("receipts")) || [];

// تهيئة المشتركين
subscribers = subscribers.map((sub, index) => ({
    id: sub.id ?? index + 1,
    name: sub.name || "بدون اسم",
    phone: sub.phone || "غير محدد",
    address: sub.address || "غير محدد",
    price: Number(sub.price) || 0,
    remaining: sub.remaining !== undefined ? Number(sub.remaining) : Number(sub.price) || 0,
    payments: Array.isArray(sub.payments) ? sub.payments : []
}));
localStorage.setItem("subscribers", JSON.stringify(subscribers));

// رقم الإيصال التلقائي
let lastReceiptNumber = parseInt(localStorage.getItem("lastReceiptNumber")) || 2000;

function renderTable(){
    const tableBody = document.getElementById("subscribersTable");
    const searchFilter = document.getElementById("search").value.toLowerCase();
    const statusFilter = document.getElementById("filterStatus").value;
    tableBody.innerHTML = "";

    let filtered = subscribers.filter(sub => {
        const status = sub.remaining === 0 ? "full" : (sub.remaining < sub.price ? "partial" : "unpaid");
        const matchesSearch =
            sub.name.toLowerCase().includes(searchFilter) ||
            sub.phone.toLowerCase().includes(searchFilter) ||
            sub.address.toLowerCase().includes(searchFilter);
        const matchesStatus = statusFilter === "all" || status === statusFilter;
        return matchesSearch && matchesStatus;
    });

    if(filtered.length === 0){
        tableBody.innerHTML = `<tr><td colspan="12">لا يوجد مشتركين مطابقين.</td></tr>`;
        return;
    }

    filtered.forEach(sub => {
        const paidAmount = sub.payments.reduce((sum, p) => sum + Number(p.amount), 0).toFixed(2);
        const statusHtml =
            sub.remaining === 0 ? '<span class="status-paid">مدفوع كليًا</span>' :
            sub.remaining < sub.price ? '<span class="status-partial">مدفوع جزئيًا</span>' :
            '<span class="status-unpaid">غير مدفوع</span>';

        tableBody.innerHTML += `
        <tr>
            <td>${sub.id}</td>
            <td>${sub.name}</td>
            <td>${sub.phone}</td>
            <td>${sub.address}</td>
            <td>$${sub.price}</td>
            <td>$${paidAmount}</td>
            <td>$${sub.remaining}</td>
            <td>${statusHtml}</td>
            <td>
                <select id="month-${sub.id}">
                    ${[...Array(12)].map((_,i)=>`<option value="${i+1}">${i+1}</option>`).join("")}
                </select>
            </td>
            <td>
                <input type="number" id="pay-${sub.id}" min="0.01" max="${sub.remaining}" step="0.01" ${sub.remaining===0?"disabled":""}>
                <button class="pay-btn" onclick="pay(${sub.id})" ${sub.remaining===0?"disabled":""}>دفع</button>
            </td>
            <td><button class="print-btn" onclick="printReceipt(${sub.id})">طباعة</button></td>
            <td><button class="wa-btn" onclick="sendWhatsApp(${sub.id})">واتساب</button></td>
        </tr>`;
    });
}

function pay(id){
    const sub = subscribers.find(s => s.id === id);
    const amount = parseFloat(document.getElementById(`pay-${id}`).value);
    const month = document.getElementById(`month-${id}`).value;

    if(isNaN(amount) || amount <= 0 || amount > sub.remaining) return alert("الرجاء إدخال مبلغ صالح.");

    sub.remaining = +(sub.remaining - amount).toFixed(2);
    sub.payments.push({ amount, month, date: new Date().toLocaleDateString() });
    localStorage.setItem("subscribers", JSON.stringify(subscribers));

    lastReceiptNumber++;
    localStorage.setItem("lastReceiptNumber", lastReceiptNumber);

    receipts.push({
        id: lastReceiptNumber,
        subscriberId: sub.id,
        name: sub.name,
        phone: sub.phone,
        address: sub.address,
        amount,
        remaining: sub.remaining,
        total: sub.price,
        month,
        date: new Date().toLocaleDateString()
    });

    localStorage.setItem("receipts", JSON.stringify(receipts));
    renderTable();
    sendWhatsApp(id, amount, month);
}

// طباعة الإيصال
function printReceipt(subId){
    const sub = subscribers.find(s => s.id === subId);
    if(!sub || sub.payments.length === 0) return alert("لا توجد دفعات");

    const last = sub.payments[sub.payments.length - 1];
    const receipt = receipts.find(r => r.subscriberId === sub.id && r.amount === last.amount && r.date === last.date);
    if(!receipt) return alert("الإيصال غير موجود");

    const win = window.open("", "", "width=250,height=500");
    win.document.write(`
    <div style="font-family:Arial, sans-serif; width:220px; padding:10px; text-align:right;">
        <h3 style="text-align:center; margin:0;">FAST NET</h3>
        <p style="text-align:center; margin:2px 0; font-size:12px;">71346411 / 71338640</p>
        <hr>
        <table style="width:100%; border-collapse:collapse; font-size:12px;">
            <tr><td style="font-weight:bold;">رقم الإيصال:</td><td>${receipt.id}</td></tr>
            <tr><td style="font-weight:bold;">الاسم:</td><td>${sub.name}</td></tr>
            <tr><td style="font-weight:bold;">الهاتف:</td><td>${sub.phone}</td></tr>
            <tr><td style="font-weight:bold;">العنوان:</td><td>${sub.address}</td></tr>
            <tr><td style="font-weight:bold;">المدفوع:</td><td>$${receipt.amount}</td></tr>
            <tr><td style="font-weight:bold;">المتبقي:</td><td>$${receipt.remaining}</td></tr>
            <tr><td style="font-weight:bold;">الشهر:</td><td>${receipt.month}</td></tr>
            <tr><td style="font-weight:bold;">التاريخ:</td><td>${receipt.date}</td></tr>
        </table>
        <hr>
        <p style="text-align:center; font-weight:bold; font-size:12px;">شكراً لاستخدامكم FAST NET</p>
    </div>
    `);
    win.print();
}

// واتساب
function sendWhatsApp(id, amount=null, month=null){
    const sub = subscribers.find(s => s.id === id);
    const last = sub.payments[sub.payments.length - 1];
    amount = amount ?? last.amount;
    month = month ?? last.month;

    const msg=`📩 إشعار دفع FAST NET
👤 الاسم: ${sub.name}
📍 العنوان: ${sub.address}
💰 المدفوع: $${amount}
💵 المتبقي: $${sub.remaining}
🗓️ الشهر: ${month}
📅 التاريخ: ${last.date}`;

    window.open(`https://wa.me/${sub.phone}?text=${encodeURIComponent(msg)}`,"_blank");
}

renderTable();
</script>

</body>
</html>
